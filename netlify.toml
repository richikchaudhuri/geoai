[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/assessments"
  to = "/.netlify/functions/assessments"
  status = 200

# Cache headers for static assets (Netlify defaults are usually good, but
# we lock in immutable caching for fonts so users don't re-download Rostex
# every page load).
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
